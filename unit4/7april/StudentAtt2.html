<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student attendance management</title>
</head>
<style>
    body{
        font-family:'Times New Roman', Times, serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
        text-align: center;
    }
    .container{
        width: 400px;
        margin:auto;

    }
    input{
        width: 65%;
        padding: 10px;
        margin: 10px;
        border: 1px solid #94a3b8;
        border-radius: 6px;
        background: #f8fafc;
        color: #0f172a;
    }
    button{
        padding: 8px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
    }
    ul{
        list-style: none;
        padding: 0%;
    }
    li{
        background: rgba(148, 163, 184, 0.18);
        margin: 10px 0;
        padding: 10px;
        border-radius: 8px;
        justify-content: space-between;

    }
    .present{
        background: #22c55e;
        color: white;
        padding: 5px 10px;
        margin-right: 5px;
    }    .absent{
        background: #ef4444;
        color: white;
        padding: 5px 10px;
        margin-right: 5px;
    }
    .delete{
        background: #64748b;
        color: white;
        padding: 5px 10px;
    }
</style>
<body>
    <h2> Student Attendance Management</h2>
    <div class="container">
        <input type="text" id="studentiput" placeholder="enter the name">
        <button id="addstudent">Add student</button>

        <ul id="studentlist"></ul>
    </div>
    <script>
        let input = document.getElementById('studentiput');
        let addbtn = document.getElementById('addstudent');
        let list = document.getElementById('studentlist');

        // add student to the list
        addbtn.addEventListener('click', function(){
           
        let name = input.value.trim();
        if(name===" ") return;
            let li = document.createElement('li')
            li.innerHTML = `
            <span>${name}</span>
            <div>
                <button class="present">Present</button>
                <button class="absent">Absent</button>
                <button class="delete">Delete</button>
            </div>
            `;
            list.appendChild(li);
            input.value = '';
        });
        //include event delegation for present, absent and delete buttons   
        list.addEventListener('click', function(e){
            listItems = list.getElementsByTagName('li');
            let li = e.target.parentElement.parentElement;
            if(e.target.classList.contains('present')){
                li.style.backgroundColor = 'green';
            }else if(e.target.classList.contains('absent')){
                li.style.backgroundColor = 'red';
            }else if(e.target.classList.contains('delete')){
                list.removeChild(li);
            }
           }    
        );

    </script>
</body>
</html>
