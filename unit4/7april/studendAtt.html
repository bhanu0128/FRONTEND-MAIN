<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Management System</title>
    <style>
        body{
            background: rgb(38, 38, 98) ;
            font-family: 'Times New Roman' , Times,serif;
            color: white;
            text-align: center;

        }

        .container{
             width: 500px;
             margin: auto;
        }
        input{
            padding: 10px;
            width: 65%;

        }
        button{
            padding: 8px;

        }
        ul{
            list-style: none;
            padding: 0;
        }
        li{
            background: rgb(35, 9, 58);
            margin: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <h2>Student Attendance Management System</h2>
    <div class="container">
        <input type="text" id="studentInput" placeholder="Enter the name">
        <button id="addStudent"> ADD </button>
        <ul id="studentList"></ul>
    </div>
</body>
</html>
